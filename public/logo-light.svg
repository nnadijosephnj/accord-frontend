<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" fill="none">
  <!-- Shield icon -->
  <g transform="translate(0,4)">
    <!-- Shield outline -->
    <path d="M36 4 C36 4 16 10 16 12 L16 38 C16 52 36 66 36 66 C36 66 56 52 56 38 L56 12 C56 10 36 4 36 4 Z"
      fill="#ea580c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Shield inner (white fill for light mode) -->
    <path d="M36 8 C36 8 20 13.5 20 15.2 L20 38 C20 50 36 62 36 62 C36 62 52 50 52 38 L52 15.2 C52 13.5 36 8 36 8 Z"
      fill="white"/>
    <!-- Handshake / arms background band -->
    <rect x="20" y="28" width="32" height="12" rx="0" fill="#ea580c"/>
    <!-- Left sleeve/arm -->
    <rect x="20" y="28" width="10" height="12" rx="1" fill="#ea580c"/>
    <!-- Right sleeve/arm -->
    <rect x="42" y="28" width="10" height="12" rx="1" fill="#ea580c"/>
    <!-- Hands clasped (simplified) -->
    <ellipse cx="30" cy="34" rx="5" ry="4.5" fill="white"/>
    <ellipse cx="42" cy="34" rx="5" ry="4.5" fill="white"/>
    <!-- Fingers detail lines on left -->
    <line x1="26" y1="32" x2="34" y2="32" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="26" y1="34.5" x2="34" y2="34.5" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="26" y1="37" x2="34" y2="37" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Fingers detail lines on right -->
    <line x1="38" y1="32" x2="46" y2="32" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="38" y1="34.5" x2="46" y2="34.5" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="38" y1="37" x2="46" y2="37" stroke="#ea580c" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- ACCORD wordmark – dark text for light mode -->
  <text x="72" y="52" font-family="Manrope, Arial Black, sans-serif" font-weight="800" font-size="32" fill="#111111" letter-spacing="-0.5">ACCORD</text>
</svg>
