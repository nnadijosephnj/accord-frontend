<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-icon.png?v=2" />
    <link rel="shortcut icon" href="/logo-icon.png?v=2" />
    <link rel="apple-touch-icon" href="/logo-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accord - Secure Agreements for Digital Work</title>
    <meta
      name="description"
      content="Create secure freelance agreements on Injective blockchain. Lock payment in escrow, share a link, and get paid safely."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const storedTheme = window.localStorage.getItem("accord-theme");
        const theme = storedTheme === "light" ? "light" : "dark";

        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
